<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Buget">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<title>Buget</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#000000;
    --card:#1c1c1e;
    --card-2:#161618;
    --line:#2c2c2e;
    --text:#f2f2f2;
    --text-dim:#8e8e93;
    --text-faint:#5c5c5e;
    --accent:#ffffff;
    --danger:#ff6b5e;
    --ok:#5fd97a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 40px);
    min-height:100vh;
  }
  .top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .nav{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .nav-btn{
    background:none;
    border:none;
    color:var(--text-dim);
    padding:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .nav-btn:active{ opacity:0.5; }
  .month-title{ font-size:22px; font-weight:600; margin:0; letter-spacing:-0.02em; text-transform:capitalize;}
  .month-sub{ font-size:13px; color:var(--text-dim); margin:3px 0 0; }
  .cal-btn{
    background:var(--card);
    border:none;
    width:38px;
    height:38px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
    cursor:pointer;
  }
  .cal-btn:active{ opacity:0.6; }

  .cards-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:26px;
  }
  .stat-card{
    background:var(--card);
    border-radius:16px;
    padding:16px 18px;
  }
  .stat-label{ font-size:13px; color:var(--text-dim); margin:0 0 8px; }
  .stat-value{ font-size:26px; font-weight:600; margin:0; letter-spacing:-0.02em; }
  .stat-value.editable{ cursor:pointer; }
  .stat-value.neg{ color:var(--danger); }
  .stat-input{
    background:transparent;
    border:none;
    border-bottom:1px solid var(--text-dim);
    color:var(--text);
    font-size:26px;
    font-weight:600;
    width:100%;
    padding:0 0 2px;
    font-family:inherit;
  }
  .stat-input:focus{ outline:none; border-color:var(--accent); }

  section{ margin-bottom:26px; }
  .sec-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .sec-title{ font-size:17px; font-weight:600; margin:0; }
  .sec-icon{ color:var(--text-dim); display:flex; }

  .item-list{
    display:flex;
    flex-direction:column;
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
  }
  .item-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    border-bottom:1px solid var(--line);
  }
  .item-row:last-child{ border-bottom:none; }

  .checkbox{
    width:22px;
    height:22px;
    border-radius:7px;
    border:1.5px solid var(--text-faint);
    flex:none;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    background:transparent;
  }
  .checkbox.checked{
    background:var(--accent);
    border-color:var(--accent);
  }
  .checkbox svg{ width:13px; height:13px; display:none; }
  .checkbox.checked svg{ display:block; }

  .item-name{
    flex:1;
    font-size:15px;
    color:var(--text);
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .item-row.checked .item-name{ color:var(--text-dim); }

  .item-amount{
    font-size:15px;
    font-weight:600;
    color:var(--text);
    flex:none;
  }
  .item-row.checked .item-amount{ color:var(--text-dim); }

  .item-del{
    background:none;
    border:none;
    color:var(--text-faint);
    padding:2px;
    display:flex;
    cursor:pointer;
    flex:none;
  }
  .item-del:active{ color:var(--danger); }

  .add-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:15px;
    background:var(--card);
    border:none;
    border-radius:16px;
    color:var(--text);
    font-size:15px;
    font-weight:500;
    width:100%;
    margin-top:10px;
    cursor:pointer;
  }
  .add-btn:active{ opacity:0.6; }

  .add-form{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .add-form input{
    background:var(--card);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:12px;
    padding:12px 14px;
    font-size:15px;
    font-family:inherit;
  }
  .add-form input:focus{ outline:none; border-color:var(--text-dim); }
  .add-form .name-input{ flex:1; min-width:0; }
  .add-form .amount-input{ width:88px; }
  .add-form button{
    background:var(--accent);
    color:#000;
    border:none;
    border-radius:12px;
    padding:0 16px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  .add-form button:active{ opacity:0.7; }

  .empty-hint{
    padding:16px;
    font-size:13px;
    color:var(--text-faint);
    text-align:center;
  }

  .hist{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 4px 4px;
    border-top:1px solid var(--line);
    margin-top:6px;
    cursor:pointer;
  }
  .hist-label{ font-size:14px; color:var(--text-dim); }
  .hist-value{
    display:flex;
    align-items:center;
    gap:4px;
    font-size:14px;
    font-weight:600;
    color:var(--text);
    text-transform:capitalize;
  }

  .sheet-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:flex-end;
    z-index:50;
  }
  .sheet-backdrop.open{ display:flex; }
  .sheet{
    background:var(--card-2);
    width:100%;
    max-width:480px;
    margin:0 auto;
    border-radius:20px 20px 0 0;
    padding:10px 18px calc(env(safe-area-inset-bottom) + 20px);
    max-height:70vh;
    overflow-y:auto;
  }
  .sheet-handle{
    width:36px;
    height:4px;
    background:var(--line);
    border-radius:2px;
    margin:8px auto 16px;
  }
  .sheet-title{ font-size:17px; font-weight:600; margin:0 0 14px; }
  .month-opt{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .month-opt:last-child{ border-bottom:none; }
  .month-opt-name{ font-size:15px; text-transform:capitalize; }
  .month-opt-name.active{ font-weight:600; }
  .month-opt-sub{ font-size:13px; color:var(--text-dim); }

  .loading{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:60px 0;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">Se încarcă…</div></div>

<div class="sheet-backdrop" id="histBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <p class="sheet-title">Istoric luni</p>
    <div id="monthList"></div>
  </div>
</div>

<script>
const MONTHS = ["ianuarie","februarie","martie","aprilie","mai","iunie","iulie","august","septembrie","octombrie","noiembrie","decembrie"];
const STORAGE_KEY = "months-index";
const RON = n => (Math.round(n*100)/100).toLocaleString('ro-RO', {maximumFractionDigits:2}) + " lei";

let state = { current: null, index: [], data: {} };

function monthKey(y,m){ return y + "-" + String(m).padStart(2,"0"); }
function monthLabel(key){
  const [y,m] = key.split("-").map(Number);
  return MONTHS[m-1] + " " + y;
}
function shiftKey(key, delta){
  let [y,m] = key.split("-").map(Number);
  m += delta;
  while(m > 12){ m -= 12; y++; }
  while(m < 1){ m += 12; y--; }
  return monthKey(y,m);
}
function emptyMonth(){
  return { buget: 0, fixe: [], ocazionale: [], economii: [] };
}
function newId(){ return 'i' + Math.random().toString(36).slice(2,10); }

async function loadIndex(){
  try{
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? JSON.parse(v) : [];
  }catch(e){ return []; }
}
async function saveIndex(idx){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(idx)); }catch(e){}
}
async function loadMonth(key){
  try{
    const v = localStorage.getItem("month:" + key);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}
async function saveMonth(key, data){
  try{ localStorage.setItem("month:" + key, JSON.stringify(data)); }catch(e){}
}

async function init(){
  const now = new Date();
  const key = monthKey(now.getFullYear(), now.getMonth()+1);
  state.index = await loadIndex();
  let data = await loadMonth(key);
  if(!data){
    data = emptyMonth();
    await saveMonth(key, data);
    if(!state.index.includes(key)){
      state.index.push(key);
      state.index.sort();
      await saveIndex(state.index);
    }
  }
  state.current = key;
  state.data[key] = data;
  render();
}

async function ensureLoaded(key){
  if(state.data[key]) return state.data[key];
  let data = await loadMonth(key);
  if(!data) data = emptyMonth();
  state.data[key] = data;
  return data;
}

async function goToMonth(key){
  await ensureLoaded(key);
  if(!state.index.includes(key)){
    state.index.push(key);
    state.index.sort();
    await saveIndex(state.index);
    await saveMonth(key, state.data[key]);
  }
  state.current = key;
  render();
}

function totalAll(list){
  return list.reduce((s,i)=>s+Number(i.amount||0),0);
}

async function persistCurrent(){
  await saveMonth(state.current, state.data[state.current]);
}

function iconCheck(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
}
function iconTrash(){
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>';
}
function iconCal(){
  return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>';
}
function iconChevron(dir){
  const rot = dir==='left' ? '180' : '0';
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate('+rot+'deg)"><polyline points="9 18 15 12 9 6"></polyline></svg>';
}
function iconPlus(){
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>';
}
function iconSection(cat){
  const map = {
    fixe: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>',
    ocazionale: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>',
    economii: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 9V7a4 4 0 0 0-4-4H8a1 1 0 0 0-1 1v3.34"></path><path d="M2 12a5 5 0 0 0 5 5h9a4 4 0 0 0 4-4v-1a2 2 0 0 0-2-2h-1"></path><circle cx="16" cy="12" r="0.5" fill="currentColor"></circle><path d="M7 17v2"></path><path d="M4 17v1"></path></svg>'
  };
  return map[cat] || '';
}

let openAddCat = null;

function itemsHtml(cat, list){
  if(list.length === 0 && openAddCat !== cat){
    return '<div class="item-list"><div class="empty-hint">Niciun element încă</div></div>';
  }
  const rows = list.map(item => `
    <div class="item-row ${item.checked ? 'checked':''}">
      <button class="checkbox ${item.checked?'checked':''}" onclick="toggleItem('${cat}','${item.id}')">${iconCheck()}</button>
      <span class="item-name">${escapeHtml(item.name)}</span>
      <span class="item-amount">${RON(item.amount)}</span>
      <button class="item-del" onclick="deleteItem('${cat}','${item.id}')">${iconTrash()}</button>
    </div>`).join('');
  return `<div class="item-list">${rows}</div>`;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  const data = state.data[state.current];
  const buget = Number(data.buget||0);
  const cheltuit = totalAll(data.fixe) + totalAll(data.ocazionale);
  const ramas = buget - cheltuit;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="top">
      <div>
        <p class="month-title">${monthLabel(state.current)}</p>
        <p class="month-sub">Buget universal activ</p>
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="navMonth(-1)">${iconChevron('left')}</button>
        <button class="cal-btn" onclick="openHistory()">${iconCal()}</button>
        <button class="nav-btn" onclick="navMonth(1)">${iconChevron('right')}</button>
      </div>
    </div>

    <div class="cards-row">
      <div class="stat-card">
        <p class="stat-label">Buget</p>
        <p class="stat-value editable" id="bugetDisplay" onclick="editBuget()">${RON(buget)}</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Rămas</p>
        <p class="stat-value ${ramas<0?'neg':''}">${RON(ramas)}</p>
      </div>
    </div>

    <section>
      <div class="sec-head">
        <p class="sec-title">Cheltuieli fixe</p>
        <span class="sec-icon">${iconSection('fixe')}</span>
      </div>
      ${itemsHtml('fixe', data.fixe)}
      ${addRowHtml('fixe')}
    </section>

    <section>
      <div class="sec-head">
        <p class="sec-title">Cheltuieli ocazionale</p>
        <span class="sec-icon">${iconSection('ocazionale')}</span>
      </div>
      ${itemsHtml('ocazionale', data.ocazionale)}
      ${addRowHtml('ocazionale')}
    </section>

    <section>
      <div class="sec-head">
        <p class="sec-title">Economii</p>
        <span class="sec-icon">${iconSection('economii')}</span>
      </div>
      ${itemsHtml('economii', data.economii)}
      ${addRowHtml('economii')}
    </section>
  `;
}

function addRowHtml(cat){
  if(openAddCat === cat){
    return `
      <div class="add-form">
        <input class="name-input" id="newName" placeholder="Denumire" autofocus>
        <input class="amount-input" id="newAmount" placeholder="lei" type="number" inputmode="decimal">
        <button onclick="confirmAdd('${cat}')">${iconPlus()}</button>
      </div>`;
  }
  const label = cat === 'economii' ? 'Adaugă economie' : 'Adaugă cheltuială';
  return `<button class="add-btn" onclick="startAdd('${cat}')">${iconPlus()} ${label}</button>`;
}

function startAdd(cat){
  openAddCat = cat;
  render();
  setTimeout(()=>{
    const el = document.getElementById('newName');
    if(el) el.focus();
  }, 30);
}

async function confirmAdd(cat){
  const nameEl = document.getElementById('newName');
  const amtEl = document.getElementById('newAmount');
  const name = (nameEl.value||'').trim();
  const amount = Number(amtEl.value||0);
  if(!name){ nameEl.focus(); return; }
  const data = state.data[state.current];
  data[cat].push({ id:newId(), name, amount, checked:false });
  openAddCat = null;
  await persistCurrent();
  render();
}

async function toggleItem(cat, id){
  const data = state.data[state.current];
  const item = data[cat].find(i=>i.id===id);
  if(item){ item.checked = !item.checked; }
  await persistCurrent();
  render();
}

async function deleteItem(cat, id){
  const data = state.data[state.current];
  data[cat] = data[cat].filter(i=>i.id!==id);
  await persistCurrent();
  render();
}

function editBuget(){
  const data = state.data[state.current];
  const el = document.getElementById('bugetDisplay');
  el.outerHTML = `<input class="stat-input" id="bugetInput" type="number" inputmode="decimal" value="${data.buget||''}" />`;
  const input = document.getElementById('bugetInput');
  input.focus();
  input.select();
  const commit = async () => {
    data.buget = Number(input.value||0);
    await persistCurrent();
    render();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); });
}

async function navMonth(delta){
  const key = shiftKey(state.current, delta);
  await goToMonth(key);
}

async function openHistory(){
  const backdrop = document.getElementById('histBackdrop');
  const list = document.getElementById('monthList');
  let keys = [...new Set([...state.index, state.current])].sort().reverse();
  list.innerHTML = keys.map(k => {
    return `<div class="month-opt" onclick="selectMonth('${k}')">
      <span class="month-opt-name ${k===state.current?'active':''}">${monthLabel(k)}</span>
      ${k===state.current ? '<span class="month-opt-sub">curent</span>' : ''}
    </div>`;
  }).join('');
  backdrop.classList.add('open');
}
function closeHistory(){
  document.getElementById('histBackdrop').classList.remove('open');
}
async function selectMonth(key){
  closeHistory();
  await goToMonth(key);
}

document.getElementById('histBackdrop').addEventListener('click', e=>{
  if(e.target.id === 'histBackdrop') closeHistory();
});

init();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
